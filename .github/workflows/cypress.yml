name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    name: API tests
    steps:
      - uses: actions/checkout@v4

      - name: Run API specs
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend (E2E) tests
    steps:
      - uses: actions/checkout@v4

      - name: Run frontend specs
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend/**/*.cy.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-videos
          path: cypress/videos
          if-no-files-found: ignore
